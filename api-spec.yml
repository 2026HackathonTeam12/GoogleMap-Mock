        '200':
          description: OpenAPI 3.0.3 JSON 스키마
          content:
            application/json:
              schema:
                type: object

  /api/docs/:
    get:
      tags:
        - Docs
      summary: Swagger UI
      operationId: getSwaggerUI
      description: 브라우저에서 API를 탐색할 수 있는 Swagger UI 페이지입니다.
      responses:
        '200':
          description: Swagger UI HTML 페이지
