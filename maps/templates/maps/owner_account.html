{% load static %}
<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>점주 OAuth 설정</title>
    <link rel="stylesheet" href="{% static 'maps/styles.css' %}">
</head>
<body class="owner-page">
    <main class="owner-shell">
        <section class="owner-panel">
            <header class="owner-header owner-header-stack">
                <div>
                    <p class="owner-kicker">점주 계정</p>
                    <h1>마이페이지</h1>
                </div>
                <nav class="owner-header-actions" aria-label="계정 메뉴">
                    <a href="{% url 'maps:index' %}">지도</a>
                    <form method="post" action="{% url 'maps:owner-logout' %}">
                        {% csrf_token %}
                        <button type="submit">로그아웃</button>
                    </form>
                </nav>
            </header>
            <dl class="owner-summary">
                <div>
                    <dt>가게</dt>
                    <dd>{{ profile.place_name }}</dd>
                </div>
                <div>
                    <dt>위치 ID</dt>
                    <dd>{{ profile.place_id }}</dd>
                </div>
                <div>
                    <dt>Client ID</dt>
                    <dd>
                        <div class="api-key-box">
                            <code id="ownerClientId" data-copy-value="{{ profile.client_id }}">{{ profile.client_id }}</code>
                            <button class="copy-credential" type="button" data-copy-target="ownerClientId">복사</button>
                        </div>
                    </dd>
                </div>
                <div>
                    <dt>Client Secret</dt>
                    <dd>
                        <div class="api-key-box">
                            <code id="ownerClientSecret" data-copy-value="{{ profile.client_secret }}">••••••••••••••••••••••••••••</code>
                            <button id="toggleClientSecret" type="button" aria-controls="ownerClientSecret" aria-pressed="false">보이기</button>
                            <button class="copy-credential" type="button" data-copy-target="ownerClientSecret">복사</button>
                        </div>
                    </dd>
                </div>
            </dl>
            <form class="owner-key-form" method="post">
                {% csrf_token %}
                <button class="owner-danger" type="submit">OAuth 자격증명 재발급</button>
            </form>
        </section>
    </main>
    <script>
        const secretValue = document.querySelector('#ownerClientSecret');
        const toggleButton = document.querySelector('#toggleClientSecret');
        const copyButtons = document.querySelectorAll('.copy-credential');
        const masked = '••••••••••••••••••••••••••••';

        toggleButton.addEventListener('click', () => {
            const isVisible = toggleButton.getAttribute('aria-pressed') === 'true';
            secretValue.textContent = isVisible ? masked : secretValue.dataset.copyValue;
            toggleButton.textContent = isVisible ? '보이기' : '숨기기';
            toggleButton.setAttribute('aria-pressed', String(!isVisible));
        });

        copyButtons.forEach((button) => {
            button.addEventListener('click', async () => {
                const target = document.querySelector(`#${button.dataset.copyTarget}`);
                await navigator.clipboard.writeText(target.dataset.copyValue);
                button.textContent = '복사됨';
                window.setTimeout(() => {
                    button.textContent = '복사';
                }, 1400);
            });
        });
    </script>
</body>
</html>
