{% load static %}
<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>서울 장소 지도</title>
    {% if not google_maps_api_key %}
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIINfQnnG7HqUvvRjuA/r9bSqKrwVJSq6ic="
        crossorigin=""
    >
    {% endif %}
    <link rel="stylesheet" href="{% static 'maps/styles.css' %}">
</head>
<body>
    <main class="map-shell">
        <div class="topbar" role="search" aria-label="장소 검색">
            <div class="brand-mark" aria-hidden="true">
                <span class="brand-blue"></span>
                <span class="brand-red"></span>
                <span class="brand-yellow"></span>
                <span class="brand-green"></span>
            </div>
            <label class="search-box">
                <span class="visually-hidden">장소 검색</span>
                <span class="search-icon" aria-hidden="true"></span>
                <input id="placeSearch" name="q" type="search" placeholder="장소 검색" autocomplete="off">
            </label>
            <button id="clearSearch" class="icon-button" type="button" aria-label="검색어 지우기">
                <span aria-hidden="true">×</span>
            </button>
        </div>
        <nav class="owner-nav" aria-label="점주 메뉴">
            {% if is_owner %}
            <a href="{% url 'maps:owner-account' %}">마이페이지</a>
            {% else %}
            <a href="{% url 'maps:owner-login' %}?next=/owner/account/">점주 로그인</a>
            {% endif %}
        </nav>

        <aside id="placePanel" class="place-panel" aria-labelledby="placeName" aria-hidden="true">
            <button id="closePanel" class="panel-close" type="button" aria-label="닫기">
                <span aria-hidden="true">×</span>
            </button>
            <div class="place-content">
                <header class="place-heading">
                    <p class="place-category" id="placeCategory"></p>
                    <h1 id="placeName"></h1>
                </header>
                <p class="place-address" id="placeAddress"></p>
                <p class="place-description" id="placeDescription"></p>
                <div class="quick-actions" id="placeActions"></div>
                <dl class="place-meta">
                    <div>
                        <dt>운영</dt>
                        <dd id="placeHours"></dd>
                    </div>
                    <div>
                        <dt>연락</dt>
                        <dd id="placeTip"></dd>
                    </div>
                </dl>
                <section class="review-section" aria-labelledby="reviewTitle">
                    <div class="review-heading">
                        <h2 id="reviewTitle">리뷰</h2>
                        {% if is_owner %}
                        <span class="owner-badge">점주</span>
                        {% endif %}
                    </div>
                    <form id="reviewForm" class="review-form">
                        <label>
                            <span>이름</span>
                            <input id="reviewAuthor" name="author_name" type="text" maxlength="80" autocomplete="name" required>
                        </label>
                        <label>
                            <span>평점</span>
                            <select id="reviewRating" name="rating" required>
                                <option value="5">5</option>
                                <option value="4">4</option>
                                <option value="3">3</option>
                                <option value="2">2</option>
                                <option value="1">1</option>
                            </select>
                        </label>
                        <label class="review-text">
                            <span>내용</span>
                            <textarea id="reviewContent" name="content" rows="3" maxlength="2000" required></textarea>
                        </label>
                        <label class="review-text">
                            <span>삭제 비밀번호</span>
                            <input id="reviewDeletePassword" name="delete_password" type="password" minlength="4" autocomplete="new-password" required>
                        </label>
                        <button class="review-submit" type="submit">등록</button>
                    </form>
                    <div id="reviewMessage" class="review-message" hidden></div>
                    <div id="reviewList" class="review-list"></div>
                </section>
            </div>
        </aside>

        <section id="resultsPanel" class="results-panel" aria-label="검색 결과" aria-live="polite"></section>
        <div id="mapNotice" class="map-notice" hidden></div>
        <div id="map" aria-label="지도"></div>
        <div id="deleteReviewDialog" class="modal-backdrop" hidden>
            <form id="deleteReviewForm" class="delete-dialog" role="dialog" aria-modal="true" aria-labelledby="deleteReviewTitle">
                <h2 id="deleteReviewTitle">리뷰 삭제</h2>
                <p>작성할 때 입력한 삭제 비밀번호를 입력하세요.</p>
                <input id="deleteReviewPassword" name="delete_password" type="password" minlength="4" autocomplete="current-password" required>
                <div class="dialog-actions">
                    <button id="cancelDeleteReview" type="button">취소</button>
                    <button class="danger-action" type="submit">삭제</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        window.GOOGLE_MAPS_ENABLED = {{ google_maps_api_key|yesno:"true,false" }};
        window.REVIEW_OWNER_ENABLED = {{ is_owner|yesno:"true,false" }};
        window.OWNER_PLACE_ID = "{{ owner_place_id|escapejs }}";
    </script>
    <script src="{% static 'maps/app.js' %}"></script>
    {% if google_maps_api_key %}
    <script
        src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key|urlencode }}&callback=initGoogleMap&loading=async&language=ko&region=KR&libraries=places"
        async
        defer
    ></script>
    {% else %}
    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>
    {% endif %}
</body>
</html>
