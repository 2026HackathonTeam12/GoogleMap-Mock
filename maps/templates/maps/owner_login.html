{% load static %}
<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>점주 로그인</title>
    <link rel="stylesheet" href="{% static 'maps/styles.css' %}">
</head>
<body class="owner-page">
    <main class="owner-shell">
        <section class="owner-panel">
            <header class="owner-header">
                <h1>점주 로그인</h1>
                <a href="{% url 'maps:index' %}">지도</a>
            </header>
            {% if errors.account %}
            <p class="owner-error">{{ errors.account }}</p>
            {% endif %}
            <form class="owner-form" method="post">
                {% csrf_token %}
                <input name="next" type="hidden" value="{{ next }}">
                <label>
                    <span>계정명</span>
                    <input name="username" value="{{ values.username }}" autocomplete="username" required>
                </label>
                <label>
                    <span>비밀번호</span>
                    <input name="password" type="password" autocomplete="current-password" required>
                </label>
                <button type="submit">로그인</button>
            </form>
        </section>
    </main>
</body>
</html>
